name: Dictator
options:
  bundleIdPrefix: ai.dictator
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: 2.9.4
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
targets:
  DictatorCore:
    type: framework
    platform: macOS
    sources:
      - Sources/DictatorCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.dictator.core
        GENERATE_INFOPLIST_FILE: YES
        DEFINES_MODULE: YES
  Dictator:
    type: application
    platform: macOS
    sources:
      - Sources/DictatorApp
    dependencies:
      - target: DictatorCore
      - package: Sparkle
    info:
      path: Sources/DictatorApp/Info.plist
      properties:
        CFBundleDisplayName: Dictator
        CFBundleName: Dictator
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "14.0"
        LSUIElement: false
        NSMicrophoneUsageDescription: Dictator records only while you hold the dictation shortcut. Audio stays on this Mac with Apple On-Device or is sent to your selected cloud speech provider.
        NSHumanReadableCopyright: "Copyright © 2026"
        SUFeedURL: https://amalshaji.github.io/dictator/appcast.xml
        SUPublicEDKey: Jd8IJcNidu3+W+wp+TcU+isDyeBn74y0UKXR2V62g7g=
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
        SUAutomaticallyUpdate: false
        SUAllowsAutomaticUpdates: false
        SUVerifyUpdateBeforeExtraction: true
        SURequireSignedFeed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.dictator.app
        PRODUCT_NAME: Dictator
        MARKETING_VERSION: 0.4.1
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Sources/DictatorApp/Dictator.entitlements
  DictatorCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/DictatorCoreTests
    dependencies:
      - target: DictatorCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  DictatorIntegrationTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/DictatorIntegrationTests
      - path: Tests/Fixtures
        buildPhase: resources
    dependencies:
      - target: DictatorCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  DictatorAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/DictatorAppTests
    dependencies:
      - target: Dictator
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Dictator:
    build:
      targets:
        Dictator: all
        DictatorCore: all
    test:
      targets:
        - DictatorCoreTests
        - DictatorIntegrationTests
        - DictatorAppTests
